<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reticle — Marker drucken</title>
  <style>
    /* ===================== SCREEN STYLES (no-print) ===================== */
    :root {
      --bg:          #0a0a0a;
      --bg-elevated: #111;
      --border:      #1a1a1a;
      --text:        #ffffff;
      --text-dim:    #888888;
      --accent:      #d4ff00;
      --font-mono:   ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* Controls bar */
    #controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #army-name {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #marker-count {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .ctrl-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .ctrl-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.75rem;
      font-family: var(--font-mono);
      padding: 0.25rem 0.5rem;
      cursor: pointer;
    }

    .ctrl-check {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .ctrl-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
      padding: 0.4rem 0.875rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .ctrl-btn:hover { opacity: 0.88; }

    .ctrl-back {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-size: 0.75rem;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .ctrl-back:hover { color: var(--text); }

    /* Print sheet (screen preview) */
    #print-wrap {
      padding: 1rem;
      background: #fff;
      min-height: calc(100vh - 56px);
    }

    #marker-sheet {
      display: flex;
      flex-wrap: wrap;
    }

    .marker-cell {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      border: 0.2mm solid #bbb;
      padding: 0;
      break-inside: avoid;
    }

    .marker-cell svg {
      display: block;
    }

    .marker-label {
      font-size: 5pt;
      color: #555;
      text-align: center;
      max-width: var(--marker-size, 8mm);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-family: sans-serif;
      line-height: 1.4;
      padding: 0 1px;
    }

    /* Error */
    #error-msg {
      padding: 2rem 1.25rem;
      color: #ff2e4d;
      font-size: 0.875rem;
    }

    /* ===================== PRINT STYLES ===================== */
    @media print {
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #fff;
        color: #000;
      }

      .no-print,
      #controls {
        display: none !important;
      }

      #print-wrap {
        padding: 0;
        background: #fff;
        min-height: 0;
      }

      #marker-sheet {
        display: flex;
        flex-wrap: wrap;
        page-break-inside: auto;
      }

      .marker-cell {
        border: 0.2mm solid #aaa;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .marker-label {
        font-size: 5pt;
        color: #444;
      }

      .marker-label.hidden-labels {
        display: none;
      }

      @page {
        size: A4 portrait;
        margin: 5mm;
      }
    }
  </style>
</head>
<body>

  <!-- Controls (screen only, hidden on print) -->
  <div id="controls" class="no-print">
    <span id="army-name">Laden&hellip;</span>

    <div class="ctrl-group">
      <label class="ctrl-label" for="ctrl-size">Groesse:</label>
      <select id="ctrl-size" class="ctrl-select">
        <option value="small">Small (6 mm)</option>
        <option value="medium" selected>Medium (8 mm)</option>
        <option value="large">Large (12 mm)</option>
      </select>
    </div>

    <div class="ctrl-group">
      <label class="ctrl-label" for="ctrl-mode">Modus:</label>
      <select id="ctrl-mode" class="ctrl-select">
        <option value="per-unit" selected>Pro Einheit</option>
        <option value="per-model">Pro Modell</option>
      </select>
    </div>

    <div class="ctrl-group">
      <input type="checkbox" id="ctrl-labels" class="ctrl-check" checked />
      <label class="ctrl-label" for="ctrl-labels">Beschriftung</label>
    </div>

    <span id="marker-count" class="ctrl-label"></span>

    <button class="ctrl-btn" onclick="window.print()">&#128424; Drucken</button>
    <a class="ctrl-back" href="index.html">&#8592; Zurueck</a>
  </div>

  <!-- Print area -->
  <div id="print-wrap">
    <p id="error-msg" hidden></p>
    <div id="marker-sheet"></div>
  </div>

  <script type="module" src="print.js"></script>
</body>
</html>
