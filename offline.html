<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="stylesheet" href="style.css" />
  <title>Reticle — Offline</title>
</head>
<body>
  <div id="app">
    <header id="app-header">
      <span id="app-title">Reticle</span>
      <span id="status-dot" class="status-dot--offline"></span>
    </header>
    <main id="app-main">
      <div id="offline-message">
        <p id="offline-icon">&#8855;</p>
        <p id="offline-title">Offline</p>
        <p id="offline-text">Keine Verbindung. Starte die App wenn du wieder online bist.</p>
      </div>
    </main>
  </div>
</body>
</html>
